# =============================================================================
# warning.yaml — RTG 防撞预警配置
# =============================================================================
# 用途: 定义分级预警的距离阈值、帧确认策略、ROI 权重
# 加载: 系统启动时读取，运行时可热更新 (通过 ROS1 service 或 文件重载)
# =============================================================================

# ---------------------------------------------------------------------------
# 预警等级定义
# ---------------------------------------------------------------------------
warning_levels:
  0: "none"        # 无风险 — 仅检测，不预警
  1: "info"        # 提示/关注 — 目标在关注区域，告知操作员
  2: "warning"     # 警告 — 目标接近，需要关注
  3: "danger"      # 危险 — 目标非常近，需要立即响应

# ---------------------------------------------------------------------------
# 帧确认策略
# ---------------------------------------------------------------------------
frame_confirmation:
  # 危险等级: 单帧即时触发 (不等待确认)
  danger_confirm_frames: 1

  # 警告/提示: 连续 N 帧确认后才触发 (抑制误报)
  warning_confirm_frames: 3
  info_confirm_frames: 3

  # 预警解除: 目标不在危险距离后持续 N-1 帧再解除 (防止抖动)
  release_delay_frames: 3

# ---------------------------------------------------------------------------
# 各类别距离阈值 (米)
# ---------------------------------------------------------------------------
# 距离定义: 目标到最近 RTG 支腿的欧氏距离 (BEV 平面投影)
# ---------------------------------------------------------------------------
distance_thresholds:
  person:
    danger:   8.0    # 0~8m → 危险 (单帧触发)
    warning: 15.0    # 8~15m → 警告
    info:    25.0    # 15~25m → 提示
    # >25m → 无风险

  truck:
    danger:  12.0    # 0~12m
    warning: 25.0    # 12~25m
    info:    40.0    # 25~40m

  car:
    danger:  10.0    # 0~10m
    warning: 20.0    # 10~20m
    info:    35.0    # 20~35m

  other_obstacle:
    danger:  10.0
    warning: 20.0
    info:    35.0

# ---------------------------------------------------------------------------
# 近距离单帧触发阈值 (无论确认帧数，距离小于此值立刻触发危险)
# ---------------------------------------------------------------------------
immediate_danger:
  person:           8.0   # 人在 8m 内 = 立刻危险
  truck:           12.0   # 集卡 12m 内 = 立刻危险
  car:             10.0
  other_obstacle:  10.0

# ---------------------------------------------------------------------------
# RTG 运动状态相关
# ---------------------------------------------------------------------------
ego_motion:
  # RTG 静止时是否输出预警
  warn_when_static: false

  # RTG 静止时的极近提示 (保留配置项，默认关闭)
  static_close_proximity_alert:
    enabled: false
    distance_threshold: 2.0   # 2m 内有人仍提示
    target_classes: [person]  # 仅对人员

  # 运动方向不确定时: 前后短距离均保守预警
  uncertain_direction:
    conservative_range: 15.0  # 前后各 15m 保守预警

# ---------------------------------------------------------------------------
# 场地语义加权 (可选, 已废弃固定 ROI — 现为运动方向 + 距离驱动)
# ---------------------------------------------------------------------------
# 仅 site_layout.enabled=true 时生效: 集卡车道降权, 禁行侧入侵保持关注
# ---------------------------------------------------------------------------
roi_zones: {}

# ---------------------------------------------------------------------------
# 预警输出规则
# ---------------------------------------------------------------------------
output_rules:
  # 同目标只输出最高等级
  deduplicate_by_highest: true

  # 同类别最多输出 N 个目标 (按距离升序取最近)
  max_targets_per_class:
    person: 5
    truck: 3
    car: 3
    other_obstacle: 5

  # 置信度低于此值的目标不参与预警
  min_confidence_for_warning: 0.3
