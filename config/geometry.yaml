# =============================================================================
# geometry.yaml — RTG 自车几何与风险模型
# =============================================================================
# BEV 坐标系: 原点 = L1 地面投影, +x = 大车道方向, +y = 禁行侧→集卡侧
# 权威来源: 几何空间与传感器FOV参考手册
# =============================================================================

# ===========================================================================
# 1. RTG 自车几何 (必需, 跨场地稳定)
# ===========================================================================
ego_geometry:
  wheelbase_x: 12.0       # 前后支腿 x 方向距离 (m)
  span_y: 23.5            # 跨距 (m), 集卡侧 ↔ 禁行侧
  leg_width: 1.0          # 支腿宽度 (m), 沿 y 方向
  leg_length: 1.0         # 支腿长度 (m), 沿 x 方向
  truck_side_y: 0.0       # 集卡侧支腿 y 中心 (BEV 原点所在)
  forbidden_side_y: -23.5 # 禁行侧支腿 y 中心 (span_y 推导)
  camera_height: 4.0
  lidar_height: 1.5

  # --- 集卡侧支腿整体 (两个腿 + 连接梁 = 一个矩形 envelope) ---
  truck_side_assembly:
    x_min: -12.5     # rear_leg.x - leg_length/2
    x_max: 0.5       # front_leg.x + leg_length/2
    y_min: -0.5      # truck_side_y - leg_width/2
    y_max: 0.5       # truck_side_y + leg_width/2

  # --- 禁行侧支腿整体 (平移 span_y 得到) ---
  forbidden_side_assembly:
    x_min: -12.5
    x_max: 0.5
    y_min: -24.0     # forbidden_side_y - leg_width/2
    y_max: -23.0     # forbidden_side_y + leg_width/2

  # --- 四个支腿中心 (距离计算用) ---
  legs:
    - { x: 0.0,    "y": 0.0    }  # L1/C1: 集卡侧前
    - { x: -12.0,  "y": 0.0    }  # L2/C2: 集卡侧后
    - { x: 0.0,    "y": -23.5  }  # L3/C3: 禁行侧前
    - { x: -12.0,  "y": -23.5  }  # L4/C4: 禁行侧后

# ===========================================================================
# 2. 风险模型 (必需)
# ===========================================================================
risk_model:
  # --- 静态包络 (目标到最近支腿的距离, m) ---
  # 由 warning.yaml 的 distance_thresholds 覆盖
  # 此处仅定义默认值

  # --- RTG 静止策略 ---
  static_policy:
    warn_when_static: false
    close_proximity_enabled: true
    close_proximity_distance: 2.0      # 静止时极近距离仍提示
    close_proximity_classes: [person]  # 仅对人员生效

  # --- 运动方向加权 ---
  # RTG 运动时, 前方 (运动方向) 目标权重 1.0, 后方目标降权
  motion_direction_weight:
    forward: 1.0       # 前方 (运动方向): 不降权
    backward: 0.5      # 后方 (背向): 降权 (仅关注, 不易碰撞)
    lateral: 0.8       # 侧向: 轻微降权

# ===========================================================================
# 3. RTG 运动扫掠走廊 (由运动状态动态计算, 此处定义参数)
# ===========================================================================
swept_corridor:
  horizon_seconds: 3.0      # 预测时间窗 (s)
  max_speed_ms: 2.0         # RTG 最大速度 (m/s)
  corridor_width_margin: 1.0  # 扫掠走廊比支腿宽的余量 (m)

# ===========================================================================
# 4. 传感器 BEV 名义坐标 (与 calib 一致)
# ===========================================================================
sensors:
  ego:
    L1: { x: 0,     "y": 0,      z: 1.5, roll: 0,   pitch: 0,  yaw:  4.62 }
    L2: { x: -12.0, "y": 0,      z: 1.5, roll: 0,   pitch: 0,  yaw: -0.82 }
    L3: { x: 0,     "y": -23.5,  z: 1.5, roll: 90,  pitch: 6,  yaw:  90   }
    L4: { x: -12.0, "y": -23.5,  z: 1.5, roll: 96,  pitch: 2,  yaw: -90   }
    C1: { x: 0,     "y": 0,      z: 4.0, orientation: "R_y(+90°)" }
    C2: { x: -12.0, "y": 0,      z: 4.0, orientation: "R_y(-90°)" }
    C3: { x: 0,     "y": -23.5,  z: 4.0, orientation: "R_y(+90°)" }
    C4: { x: -12.0, "y": -23.5,  z: 4.0, orientation: "R_y(-90°)" }

  adjacent:
    C1: { x: -12.0, "y": 8.5,  z: 4.0 }
    C2: { x: 0,     "y": 8.5,  z: 4.0 }
    C3: { x: -12.0, "y": 32.0, z: 4.0 }
    C4: { x: 0,     "y": 32.0, z: 4.0 }
    L1: { x: -12.0, "y": 8.5,  z: 1.5 }
    L2: { x: 0,     "y": 8.5,  z: 1.5 }
    L3: { x: -12.0, "y": 32.0, z: 1.5 }
    L4: { x: 0,     "y": 32.0, z: 1.5 }

# ===========================================================================
# 5. 场地布局 (可选 — 有则用于降低误报, 无则纯几何也能跑)
# ===========================================================================
site_layout:
  enabled: true
  description: "本箱区 + 相邻箱区车道布局 (2026-06-15 坐标系)"

  # --- 本 RTG 区域 (-y 方向: 集卡车道 + 集装箱 + 禁行侧) ---
  truck_lane:
    y_range: [-6.0, -1.5]
    description: "集卡车道 (正常通行, 降权)"

  container_rows:
    y_start: -22.63
    y_end: -6.0
    description: "6 列集装箱 (静态背景)"

  main_lane_forbidden_side:
    y_range: [-25.6, -22.63]
    description: "禁行侧大车道"

  # --- 相邻箱区 (+y 方向) ---
  middle_lane:
    y_range: [1.5, 7.0]
    description: "中间车道"

  adjacent_main_lane_truck_side:
    y_range: [7.0, 10.0]
    description: "相邻 RTG 集卡侧大车道"

  adjacent_truck_lane:
    y_range: [10.0, 14.5]
    description: "相邻箱区集卡车道"

  adjacent_container_rows:
    y_start: 14.5
    y_end: 31.13
    description: "相邻箱区 6 列集装箱"

  adjacent_main_lane_forbidden_side:
    y_range: [31.13, 33.5]
    description: "相邻 RTG 禁行侧大车道"

# ===========================================================================
# 6. 车道边界 (可选 — 相机黄线投影, 暂无数据)
# ===========================================================================
lanes:
  bev_boundaries: {}  # 由 image_yellow_lines_to_bev.py 自动填充
