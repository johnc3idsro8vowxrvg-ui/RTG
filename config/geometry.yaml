# =============================================================================
# geometry.yaml — RTG 几何与车道配置
# =============================================================================
# 用途: 定义 RTG 自车 footprint、车道边界、ROI 区域
# 来源: 现场测量 + 相机图像黄线标注
# 加载: 系统启动时读取，通过图像黄线投影到 BEV 自动生成车道 ROI
# =============================================================================

# ---------------------------------------------------------------------------
# RTG 自车 footprint（4 条支腿在 BEV 坐标系下的地面投影）
# 坐标系: BEV 系，原点 = L1 (集卡侧前雷达) 在地面的垂直投影
# +y = 禁行侧 → 集卡侧 (与 ROS 惯例一致)
# 传感器命名: 集卡侧 = y≈0, 禁行侧 = y≈-23.5
# ---------------------------------------------------------------------------
ego_footprint:
  # 集卡侧 / 左侧（y ≈ 0，原点所在侧，大车道中间）
  truck_lane_side:
    front_leg:        # 前支腿中心 (靠近 +x 方向)
      x: 0.0
      "y": 0.0        # 原点在大车道中间
      width: 1.0      # 腿宽 (m), 沿 y 方向
      length: 1.0     # 腿长 (m), 沿 x 方向
    rear_leg:         # 后支腿中心 (靠近 -x 方向)
      x: -12.0        # 轮组间距，沿 x 轴
      "y": 0.0
      width: 1.0
      length: 1.0

  # 禁行侧（y ≈ -23.5m，跨距远端，+y 指向集卡侧）
  forbidden_side:
    front_leg:
      x: 0.0
      "y": -23.5
      width: 1.0
      length: 1.0
    rear_leg:
      x: -12.0
      "y": -23.5
      width: 1.0
      length: 1.0

# ---------------------------------------------------------------------------
# 传感器 BEV 名义坐标（地面投影）+ Bag 估计旋转 (2026-06-11)
# 相机和雷达在同一垂线上，相机 ~4m 高，雷达 ~1.5m 高
# 传感器编号: 1=集卡侧前, 2=集卡侧后, 3=禁行侧前, 4=禁行侧后
#
# 注意: BEV 与 TF 坐标系已对齐 (2026-06-15):
#       BEV +x = TF +x (大车道方向)
#       BEV +y = TF +y (禁行侧→集卡侧, 与 ROS 惯例一致)
#       旋转经集装箱边缘分析 (L1/L2) + RViz 视觉对齐 (L3/L4) 确认。
#       RoboSense 32线 (L3/L4) 旋转90°安装 → 垂直360°/水平~70°沿大车道扫描。
#
#       L1: BEV(0, 0, 1.5),        RPY = (  0°,   0°,  +4.62°)  [container-edge]
#       L2: BEV(-12.0, 0, 1.5),     RPY = (  0°,   0°,  -0.82°)  [container-edge]
#       L3: BEV(0, -23.5, 1.5),     RPY = (+90°,  +6°,  +90° )   [RViz visual align]
#       L4: BEV(-12.0, -23.5, 1.5), RPY = (+96°,  +2°,  -90° )   [RViz visual align]
#       C1/C3: R_y(+90°) 朝 +x;  C2/C4: R_y(-90°) 朝 -x
#       L2→L1 拼接: 同坐标系下纯平移 (-12.0, 0, 0)，无需额外旋转
# ---------------------------------------------------------------------------
sensors:
  # 本 RTG (位于本箱区) — 设计值 + bag 估计旋转
  ego:
    L1: { x: 0,    "y": 0,     z: 1.5, roll:   0, pitch:  0, yaw:   4.62 }  # 集卡侧前雷达 (原点), OS1 128线
    L2: { x: -12.0, "y": 0,    z: 1.5, roll:   0, pitch:  0, yaw:  -0.82 }  # 集卡侧后雷达, OS1 128线
    L3: { x: 0,    "y": -23.5, z: 1.5, roll:  90, pitch:  6, yaw:  90    }  # 禁行侧前雷达, RoboSense 32线, 旋转90°安装
    L4: { x: -12.0, "y": -23.5, z: 1.5, roll:  96, pitch:  2, yaw: -90    }  # 禁行侧后雷达, RoboSense 32线, 旋转90°安装
    C1: { x: 0,    "y": 0,     z: 4.0, orientation: "R_y(+90°) 朝+x" }       # 集卡侧前相机 (与L1同垂线)
    C2: { x: -12.0, "y": 0,    z: 4.0, orientation: "R_y(-90°) 朝-x" }       # 集卡侧后相机 (与L2同垂线)
    C3: { x: 0,    "y": -23.5, z: 4.0, orientation: "R_y(+90°) 朝+x" }       # 禁行侧前相机 (与L3同垂线)
    C4: { x: -12.0, "y": -23.5, z: 4.0, orientation: "R_y(-90°) 朝-x" }       # 禁行侧后相机 (与L4同垂线)

  # 相邻 RTG (中心对称: x'=-12.0-x, y'=8.5-y, 前后互换)
  adjacent:
    C1: { x: -12.0, "y": 8.5, z: 4.0 }   # 集卡侧前相机 → 在后
    C2: { x: 0,    "y": 8.5, z: 4.0 }    # 集卡侧后相机 → 在前
    C3: { x: -12.0, "y": 32.0, z: 4.0 }  # 禁行侧前相机 → 在后
    C4: { x: 0,    "y": 32.0, z: 4.0 }   # 禁行侧后相机 → 在前
    L1: { x: -12.0, "y": 8.5, z: 1.5 }
    L2: { x: 0,    "y": 8.5, z: 1.5 }
    L3: { x: -12.0, "y": 32.0, z: 1.5 }
    L4: { x: 0,    "y": 32.0, z: 1.5 }

# ---------------------------------------------------------------------------
# RTG 几何参数
# ---------------------------------------------------------------------------
rtg_dimensions:
  span_width: 23.5    # 跨距 (m), 集卡侧 ↔ 禁行侧 大车道中间距离
  wheelbase: 12.0     # 轮组间距 (m), 前后支腿的 x 方向距离
  leg_width: 1.0      # 支腿默认宽度 (m), 沿 y 方向
  leg_length: 1.0     # 支腿默认长度 (m), 沿 x 方向
  camera_height: 4.0  # 相机安装高度 (m)
  lidar_height: 1.5   # 雷达安装高度 (m)

# ---------------------------------------------------------------------------
# 跨距方向 (y轴) 车道布局 — +y = 禁行侧 → 集卡侧 (2026-06-15)
# 所有车道/箱列均平行于大车道方向 (x轴)
# 权威来源: 几何空间与传感器FOV参考手册 §4
# ---------------------------------------------------------------------------
lane_layout:
  # 集卡侧大车道 (原点周围)
  main_lane_truck_side:
    y_range: [-1.5, 1.5]      # 约 3m 宽, 以大车道中间(y=0)为中心
    description: "集卡侧大车道，原点 L1 在其中心"

  # 集卡车道 (紧邻集卡侧大车道, -y 方向)
  truck_lane:
    y_range: [-6.0, -1.5]     # 约 4~4.5m 宽
    description: "集卡通行、装卸集装箱"

  # 6 列集装箱 (∥x 轴, -y 方向 → 禁行侧)
  container_rows:
    count: 6
    row_width: 2.438
    gap_width: 0.40
    total_width: 16.63         # 6×2.438 + 5×0.40
    y_start: -22.63            # 列6 (最靠禁行侧)
    y_end: -6.0                # 列1 (最靠集卡侧)
    rows:
      - { index: 1, y_range: [-8.44,  -6.0]   }  # 离集卡侧最近
      - { index: 2, y_range: [-11.28, -8.84]  }
      - { index: 3, y_range: [-14.12, -11.68] }
      - { index: 4, y_range: [-16.95, -14.52] }
      - { index: 5, y_range: [-19.79, -17.35] }
      - { index: 6, y_range: [-22.63, -20.19] }  # 离禁行侧最近

  # 禁行侧大车道 (y ≈ -23.5 ~ -25.6)
  main_lane_forbidden_side:
    y_range: [-25.6, -22.63]
    description: "禁行侧大车道，L3/L4/C3/C4 在 y=-23.5"

  # -----------------------------------------------------------------------
  # +y 侧 — 相邻箱区布局 (镜像对称: y'=8.5-y, x 不变)
  # -----------------------------------------------------------------------

  # 中间车道 (两个箱区之间, 宽约 5.5m, y=+4.25 为镜像对称轴)
  middle_lane:
    y_range: [1.5, 7.0]
    description: "中间车道，分隔本箱区与相邻箱区"

  # 相邻 RTG 集卡侧大车道 (宽约 3m)
  adjacent_main_lane_truck_side:
    y_range: [7.0, 10.0]
    description: "相邻 RTG 集卡侧大车道，adj L1/L2 在 y=+8.5"

  # 相邻箱区 集卡车道 (宽约 4.5m)
  adjacent_truck_lane:
    y_range: [10.0, 14.5]
    description: "相邻箱区集卡通行区域"

  # 相邻箱区 6 列集装箱
  adjacent_container_rows:
    y_start: 14.5
    y_end: 31.13
    row_width: 2.438
    gap_width: 0.40
    total_width: 16.63
    rows:
      - { index: 1, y_range: [14.5,  16.94] }
      - { index: 2, y_range: [16.94, 19.38] }
      - { index: 3, y_range: [19.38, 21.82] }
      - { index: 4, y_range: [21.82, 24.26] }
      - { index: 5, y_range: [24.26, 26.70] }
      - { index: 6, y_range: [26.70, 29.14] }
    description: "相邻箱区 6 列集装箱"

  # 相邻 RTG 禁行侧大车道
  adjacent_main_lane_forbidden_side:
    y_range: [31.13, 33.5]
    description: "相邻 RTG 禁行侧大车道，adj L3/L4 在 y=+32.0"

  # 铺装路面
  pavement_forbidden_side:
    y_range: [-50, -25.6]     # 禁行侧外部
  pavement_truck_side:
    y_range: [33.5, 50]       # 相邻箱区外部

# ---------------------------------------------------------------------------
# 车道边界 — 从相机图像黄线位置投影到 BEV
# ---------------------------------------------------------------------------
# 方法: 在每张相机图中标注黄线的像素位置 → 通过内外参投影到 z=0 平面
# image_annotations 是输入，bev_boundaries 是投影后的输出（可自动计算）
# ---------------------------------------------------------------------------
lanes:
  # C1 相机图像中的黄线像素位置
  camera_01:
    yellow_lines:
      - name: "main_lane_left_boundary"
        description: "集卡侧大车道 +y 侧边界 (中间车道侧)"
        pixel_points: []             # 待现场标注: [[u1,v1], [u2,v2], ...]
      - name: "main_lane_right_boundary"
        description: "集卡侧大车道 -y 侧边界 (集卡车道分界)"
        pixel_points: []
      - name: "truck_lane_right_boundary"
        description: "集卡车道 -y 侧边界 (与第一列箱的分界)"
        pixel_points: []

  # C2 相机图像中的黄线像素位置
  camera_02:
    yellow_lines:
      - name: "main_lane_left_boundary"
        pixel_points: []
      - name: "main_lane_right_boundary"
        pixel_points: []
      - name: "truck_lane_right_boundary"
        pixel_points: []

  # -----------------------------------------------------------------------
  # BEV 车道边界 — 从以上像素标注 + calib.yaml 自动计算
  # 由 image_yellow_lines_to_bev.py 脚本自动填充
  # -----------------------------------------------------------------------
  bev_boundaries:
    main_lane_truck_side:       # 集卡侧大车道
      y_min: 0.0                # 待自动计算
      y_max: 0.0
    truck_lane:                 # 集卡车道
      y_min: 0.0
      y_max: 0.0
    main_lane_forbidden_side:   # 禁行侧大车道
      y_min: 0.0
      y_max: 0.0

# ---------------------------------------------------------------------------
# 自车遮挡 mask — 相机画面中固定被本车结构遮挡的区域
# ---------------------------------------------------------------------------
self_occlusion:
  camera_01:
    masked_regions:
      - name: "leg_structure"
        description: "图像下方被支腿遮挡区域"
        x_min: 0
        y_min: 1400             # 待根据实际图像标注
        x_max: 1920
        y_max: 1920
      - name: "equipment_cover"
        description: "蓝色设备罩遮挡"
        x_min: 800
        y_min: 1600
        x_max: 1200
        y_max: 1920
  camera_02:
    masked_regions:
      - name: "leg_structure"
        x_min: 0
        y_min: 1400
        x_max: 1920
        y_max: 1920

# ---------------------------------------------------------------------------
# 堆场结构先验（用于运动估计和 ROI 校验）
# ---------------------------------------------------------------------------
yard_structure:
  container_rows: 6
  ground_z: 0.0
  typical_container_height: [2.6, 2.9]           # 典型集装箱高度范围 (m)
  container_box_width: 2.438                      # 标准集装箱宽 (m)
  container_box_length: [6.058, 12.192]           # 20ft / 40ft 箱长 (m)

